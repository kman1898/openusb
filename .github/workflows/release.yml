name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            packages: -p openusbd -p openusb-cli -p openusb-client-linux
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            packages: -p openusbd -p openusb-cli
          - name: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
            packages: -p openusbd -p openusb-cli
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            packages: -p openusbd -p openusb-cli -p openusb-client-macos
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            packages: -p openusbd -p openusb-cli -p openusb-client-macos
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            packages: -p openusbd -p openusb-cli -p openusb-client-windows
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.packages }}

      # ── macOS: Create .app bundle + .dmg ──
      - name: Create macOS app bundle
        if: startsWith(matrix.name, 'macos')
        run: |
          APP="staging/OpenUSB.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          # Binary
          cp "target/${{ matrix.target }}/release/openusb-client" "$APP/MacOS/"
          chmod +x "$APP/MacOS/openusb-client"

          # Info.plist
          cp client/macos/Info.plist "$APP/"

          # Icon
          cp assets/AppIcon.icns "$APP/Resources/" 2>/dev/null || true

          # Also include server + CLI loose in staging
          cp "target/${{ matrix.target }}/release/openusbd" staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb" staging/ 2>/dev/null || true

          # Create DMG
          DMG_TEMP=$(mktemp -d)
          cp -R staging/OpenUSB.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          hdiutil create -volname "OpenUSB" -srcfolder "$DMG_TEMP" -ov -format UDZO "OpenUSB-${{ matrix.name }}.dmg"
          rm -rf "$DMG_TEMP"

          # Also tar the server binaries for headless use
          mkdir -p server-staging
          cp "target/${{ matrix.target }}/release/openusbd" server-staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb" server-staging/ 2>/dev/null || true
          tar czf openusb-${{ matrix.name }}-server.tar.gz -C server-staging .

      # ── Windows: Package as zip with exe ──
      - name: Package Windows
        if: startsWith(matrix.name, 'windows')
        shell: bash
        run: |
          mkdir -p staging
          for bin in openusbd.exe openusb.exe openusb-client.exe; do
            [ -f "target/${{ matrix.target }}/release/$bin" ] && cp "target/${{ matrix.target }}/release/$bin" staging/
          done
          # Rename client to OpenUSB.exe for user-friendly double-click
          [ -f staging/openusb-client.exe ] && cp staging/openusb-client.exe staging/OpenUSB.exe
          echo "Contents:"
          ls -la staging/
          cd staging && 7z a ../openusb-${{ matrix.name }}.zip *

      # ── Linux desktop: tar with .desktop file ──
      - name: Package Linux desktop
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/openusbd" staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb" staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb-client" staging/ 2>/dev/null || true
          cp client/linux/openusb-client.desktop staging/
          cp assets/icon-256.png staging/openusb.png 2>/dev/null || true
          echo "Contents:"
          ls -la staging/
          tar czf openusb-${{ matrix.name }}.tar.gz -C staging .

      # ── Linux ARM (server only): tar ──
      - name: Package Linux ARM
        if: matrix.cross
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/openusbd" staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb" staging/ 2>/dev/null || true
          echo "Contents:"
          ls -la staging/
          tar czf openusb-${{ matrix.name }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            openusb-${{ matrix.name }}.tar.gz
            openusb-${{ matrix.name }}.zip
            openusb-${{ matrix.name }}-server.tar.gz
            OpenUSB-${{ matrix.name }}.dmg

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List release files
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/release-*/*
