name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.1.2)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # macOS Build + Code Sign + Notarize
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p openusbd -p openusb-cli -p openusb-client-macos

      - name: Create app bundle
        run: |
          APP="OpenUSB.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp "target/${{ matrix.target }}/release/openusb-client" "$APP/MacOS/"
          chmod +x "$APP/MacOS/openusb-client"
          cp client/macos/Info.plist "$APP/"
          cp assets/AppIcon.icns "$APP/Resources/" 2>/dev/null || true

      # ── Code Signing ──
      - name: Import code signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

      - name: Sign app bundle
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements /dev/null \
            "OpenUSB.app"

      - name: Ad-hoc codesign bundle (when no Developer ID)
        if: env.MACOS_CERTIFICATE == ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          # Strip linker signature from binary first, then sign the full bundle
          codesign --remove-signature "OpenUSB.app/Contents/MacOS/openusb-client" || true
          # Sign the bundle with ad-hoc identity, binding Info.plist and sealing resources
          /usr/bin/codesign --force --deep --sign - --identifier "dev.openusb.client" "OpenUSB.app"
          echo "Codesign verification:"
          codesign -dvvv "OpenUSB.app" 2>&1 | grep -E "Identifier|Info.plist|Sealed|Signature|flags"

      - name: Notarize app
        if: env.MACOS_NOTARIZE_APPLE_ID != ''
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "OpenUSB.app" "OpenUSB-notarize.zip"
          xcrun notarytool submit "OpenUSB-notarize.zip" \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --password "$MACOS_NOTARIZE_PASSWORD" \
            --team-id "$MACOS_NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple "OpenUSB.app"

      - name: Create DMG and ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          # Create DMG with drag-to-Applications
          DMG_TEMP=$(mktemp -d)
          cp -R OpenUSB.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          hdiutil create -volname "OpenUSB" -srcfolder "$DMG_TEMP" \
            -ov -format UDZO "openusb_v${VERSION}_macos_${{ matrix.arch }}.dmg"
          rm -rf "$DMG_TEMP"

          # Also create a ZIP for users who prefer it
          ditto -c -k --keepParent "OpenUSB.app" \
            "openusb_v${VERSION}_macos_${{ matrix.arch }}.zip"

          # Server-only binaries
          mkdir -p server-staging
          cp "target/${{ matrix.target }}/release/openusbd" server-staging/ 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/openusb" server-staging/ 2>/dev/null || true
          tar czf "openusb_v${VERSION}_macos_${{ matrix.arch }}_server.tar.gz" -C server-staging .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            openusb_v*_macos_${{ matrix.arch }}.dmg
            openusb_v*_macos_${{ matrix.arch }}.zip
            openusb_v*_macos_${{ matrix.arch }}_server.tar.gz

  # ──────────────────────────────────────────────
  # Windows Build + Sign
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc -p openusbd -p openusb-cli -p openusb-client-windows

      # ── Code Signing ──
      - name: Sign executable
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        shell: powershell
        run: |
          $cert = [System.Convert]::FromBase64String("$env:WINDOWS_CERTIFICATE")
          [System.IO.File]::WriteAllBytes("certificate.pfx", $cert)
          & 'C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe' sign `
            /f certificate.pfx `
            /p "$env:WINDOWS_CERTIFICATE_PWD" `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /fd sha256 `
            "target\x86_64-pc-windows-msvc\release\openusb-client.exe"
          Remove-Item certificate.pfx

      - name: Create release ZIP
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p staging
          cp target/x86_64-pc-windows-msvc/release/openusb-client.exe "staging/OpenUSB.exe" 2>/dev/null || true
          cp target/x86_64-pc-windows-msvc/release/openusbd.exe staging/ 2>/dev/null || true
          cp target/x86_64-pc-windows-msvc/release/openusb.exe staging/ 2>/dev/null || true
          cd staging && 7z a "../openusb_v${VERSION}_windows_x86_64.zip" *

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: openusb_v*_windows_x86_64.zip

  # ──────────────────────────────────────────────
  # Linux Desktop Build
  # ──────────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p openusbd -p openusb-cli -p openusb-client-linux
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p staging
          cp target/release/openusbd staging/
          cp target/release/openusb staging/
          cp target/release/openusb-client staging/
          cp client/linux/openusb-client.desktop staging/
          cp assets/icon-256.png staging/openusb.png 2>/dev/null || true
          tar czf "openusb_v${VERSION}_linux_x86_64.tar.gz" -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: openusb_v*_linux_x86_64.tar.gz

  # ──────────────────────────────────────────────
  # Linux ARM Builds (Raspberry Pi, server only)
  # ──────────────────────────────────────────────
  build-linux-arm:
    name: Build Linux ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: arm64
            target: aarch64-unknown-linux-gnu
          - name: armv7
            target: armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build
        run: cross build --release --target ${{ matrix.target }} -p openusbd -p openusb-cli
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/openusbd" staging/
          cp "target/${{ matrix.target }}/release/openusb" staging/
          tar czf "openusb_v${VERSION}_linux_${{ matrix.name }}.tar.gz" -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.name }}-build
          path: openusb_v*_linux_${{ matrix.name }}.tar.gz

  # ──────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux, build-linux-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" | sort | while read f; do
            sha256sum "$f"
          done | tee checksums.txt
      - name: List release files
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenUSB ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/macos-*/*.dmg
            artifacts/macos-*/*.zip
            artifacts/macos-*/*.tar.gz
            artifacts/windows-build/*.zip
            artifacts/linux-build/*.tar.gz
            artifacts/linux-arm64-build/*.tar.gz
            artifacts/linux-armv7-build/*.tar.gz
            artifacts/checksums.txt
