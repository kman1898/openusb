name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-dashboard/package-lock.json
      - run: cd web-dashboard && npm ci && npm run build
      - name: Package dashboard
        run: tar czf openusb-web-dashboard.tar.gz -C web-dashboard/dist .
      - uses: actions/upload-artifact@v4
        with:
          name: web-dashboard
          path: openusb-web-dashboard.tar.gz

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            ext: ""
          - name: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
            ext: ""
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/openusbd${{ matrix.ext }} staging/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/openusb${{ matrix.ext }} staging/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/openusb-client${{ matrix.ext }} staging/ 2>/dev/null || true
          ls -la staging/
          tar czf openusb-${{ matrix.name }}.tar.gz -C staging .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/openusbd.exe staging/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/openusb.exe staging/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/openusb-client.exe staging/ 2>/dev/null || true
          ls -la staging/
          cd staging && 7z a ../openusb-${{ matrix.name }}.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            openusb-${{ matrix.name }}.tar.gz
            openusb-${{ matrix.name }}.zip

  release:
    name: Create Release
    needs: [build, build-dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List release files
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/release-*/*
            artifacts/web-dashboard/*
