name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            packages: -p openusbd -p openusb-cli -p openusb-client-linux
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            packages: -p openusbd -p openusb-cli
          - name: linux-armv7
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
            packages: -p openusbd -p openusb-cli
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            packages: -p openusbd -p openusb-cli -p openusb-client-macos
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            packages: -p openusbd -p openusb-cli -p openusb-client-macos
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            packages: -p openusbd -p openusb-cli -p openusb-client-windows
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.packages }}
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.packages }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          for bin in openusbd openusb openusb-client; do
            [ -f "target/${{ matrix.target }}/release/$bin" ] && cp "target/${{ matrix.target }}/release/$bin" staging/
          done
          echo "Contents:"
          ls -la staging/
          tar czf openusb-${{ matrix.name }}.tar.gz -C staging .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          for bin in openusbd.exe openusb.exe openusb-client.exe; do
            [ -f "target/${{ matrix.target }}/release/$bin" ] && cp "target/${{ matrix.target }}/release/$bin" staging/
          done
          echo "Contents:"
          ls -la staging/
          cd staging && 7z a ../openusb-${{ matrix.name }}.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            openusb-${{ matrix.name }}.tar.gz
            openusb-${{ matrix.name }}.zip

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List release files
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/release-*/*
