<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e66f5"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- USB trident symbol (left side) -->
  <g transform="translate(110, 120)" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main vertical stem -->
    <line x1="70" y1="60" x2="70" y2="250"/>
    <!-- Base rectangle (USB connector) -->
    <rect x="45" y="230" width="50" height="40" rx="4" fill="#fff" stroke="none"/>
    <!-- Top circle -->
    <circle cx="70" cy="40" r="20" fill="#fff" stroke="none"/>
    <!-- Left branch -->
    <line x1="70" y1="140" x2="20" y2="100"/>
    <circle cx="20" cy="80" r="16" fill="none" stroke="#fff" stroke-width="14"/>
    <!-- Right branch -->
    <line x1="70" y1="140" x2="120" y2="100"/>
    <rect x="104" y="64" width="32" height="32" rx="4" fill="none" stroke="#fff" stroke-width="12"/>
  </g>

  <!-- WiFi/network waves (right side) -->
  <g transform="translate(300, 160)" fill="none" stroke="#22c55e" stroke-width="16" stroke-linecap="round">
    <!-- Inner arc -->
    <path d="M 0,80 A 50,50 0 0,1 0,-20" opacity="1"/>
    <!-- Middle arc -->
    <path d="M 20,100 A 90,90 0 0,1 20,-40" opacity="0.75"/>
    <!-- Outer arc -->
    <path d="M 40,120 A 130,130 0 0,1 40,-60" opacity="0.5"/>
    <!-- Signal dot -->
    <circle cx="-10" cy="30" r="12" fill="#22c55e" stroke="none"/>
  </g>
</svg>
